{% extends 'base.html' %}
{% block title %}Login — Product Catalog{% endblock %}

{% block content %}
<div class="card">
    <h1>Login</h1>
    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm"
          data-sitekey="{{ site_key }}" data-recaptcha-action="login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="g-recaptcha-response"{% if not recaptcha_enabled %} value="dev-bypass"{% endif %}>

        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required
                   autocomplete="username" maxlength="50">
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   autocomplete="current-password">
        </div>

        <button type="submit" class="btn">Login</button>
    </form>
</div>
{% endblock %}
